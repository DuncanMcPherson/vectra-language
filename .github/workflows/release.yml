name: Release

on:
  push: 
    branches:
      - master
    
jobs:
  version:
    name: Generate next version
    runs-on: ubuntu-latest
    outputs: 
      version: ${{ steps.semantic.outputs.new_release_version }}
      new_release: ${{ steps.semantic.outputs.new_release_published }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      notes: ${{ steps.semantic.outputs.new_release_notes }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Generate version
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build:
    name: Build and release
    needs: version
    runs-on: ubuntu-latest
    if: ${{ needs.version.outputs.new_release == 'true' }}
    strategy:
      matrix:
        rid: [win-x64, linux-x64, osx-x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: 
          dotnet-version: 10.0.x
      - name: Set build version
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          python3 - << 'PY'
                    import os, xml.etree.ElementTree as ET

                    version = os.environ['VERSION']
                    paths = [
                      "src/VectraLang/VectraLang.csproj",
                    ]

                    for path in paths:
                      tree = ET.parse(path)
                      root = tree.getroot()

                      ns = ""
                      if root.tag.startswith("{"):
                        ns = root.tag.split("}")[0] + "}"
                      def find_or_create(parent, tag):
                        el = parent.find(f"{ns}{tag}")
                        if el is None:
                          el = ET.SubElement(parent, f"{ns}{tag}")
                        return el
                      pg = root.find(f"{ns}PropertyGroup")
                      if pg is None:
                        pg = ET.SubElement(root, f"{ns}PropertyGroup")
                      find_or_create(pg, "Version").text = version
                      find_or_create(pg, "AssemblyVersion").text = version
                      find_or_create(pg, "FileVersion").text = version
                      find_or_create(pg, "InformationalVersion").text = version

                      tree.write(path, encoding="utf-8", xml_declaration=True)
                      print(f"Stamped {path} with version {version}")
                    PY
      - name: Build
        run: |
          dotnet publish src/VectraLang/VectraLang.csproj \
          --configuration Release \
          --runtime ${{ matrix.rid }} \
          --self-contained true \
          -p:PublishSingleFile=true \
          --output ./publish/${{ matrix.rid }}
      - uses: softprops/action-gh-release@v1
        with:
          files: ./publish/${{ matrix.rid }}/*